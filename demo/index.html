<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Design System - Component Demo</title>
    <!-- Puter.js for FREE unlimited Z.AI GLM API -->
    <script src="https://js.puter.com/v2/"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 2rem;
      }
      
      .container {
        max-width: 1200px;
        margin: 0 auto;
      }
      
      header {
        text-align: center;
        color: white;
        margin-bottom: 3rem;
      }
      
      header h1 {
        font-size: 3rem;
        margin-bottom: 0.5rem;
        text-shadow: 0 2px 10px rgba(0,0,0,0.2);
      }
      
      header p {
        font-size: 1.25rem;
        opacity: 0.9;
      }
      
      .section {
        background: white;
        border-radius: 1rem;
        padding: 2rem;
        margin-bottom: 2rem;
        box-shadow: 0 20px 40px rgba(0,0,0,0.1);
      }
      
      .section h2 {
        font-size: 1.75rem;
        margin-bottom: 1.5rem;
        color: #1a202c;
      }
      
      .button-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 1.5rem;
        margin-top: 1.5rem;
      }
      
      .button-demo {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        padding: 1.5rem;
        background: #f7fafc;
        border-radius: 0.75rem;
      }
      
      .button-demo h3 {
        font-size: 1rem;
        color: #4a5568;
        margin-bottom: 0.5rem;
      }
      
      .button-demo p {
        font-size: 0.875rem;
        color: #718096;
      }
      
      .goal-badge {
        display: inline-block;
        padding: 0.25rem 0.75rem;
        border-radius: 9999px;
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        margin-bottom: 0.5rem;
      }
      
      .goal-convert { background: #3b82f6; color: white; }
      .goal-inform { background: #6b7280; color: white; }
      .goal-engage { background: #a855f7; color: white; }
      
      code {
        background: #1a202c;
        color: #e2e8f0;
        padding: 0.25rem 0.5rem;
        border-radius: 0.25rem;
        font-size: 0.875rem;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
