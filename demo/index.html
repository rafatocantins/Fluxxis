<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Fluxxis — Interfaces that Morph with Intent</title>
    <meta name="description" content="Fluxxis — Adaptive UI that changes structure based on how users think. Open-source, intent-driven, built for humans and AI agents." />
    <meta name="keywords" content="Fluxxis, adaptive UI, intent-driven, interface engine, React, TypeScript, agent-native, open source, WCAG" />
    <meta name="author" content="Fluxxis Research Team" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://fluxxis.dev" />

    <!-- Open Graph -->
    <meta property="og:title" content="Fluxxis — Interfaces that Morph with Intent" />
    <meta property="og:description" content="Adaptive UI that changes structure based on how users think. Built for humans and AI agents." />
    <meta property="og:image" content="https://raw.githubusercontent.com/rafatocantins/Fluxxis/main/demo/public/og-image.png" />
    <meta property="og:url" content="https://fluxxis.dev" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Fluxxis" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Fluxxis — Interfaces that Morph with Intent" />
    <meta name="twitter:description" content="Adaptive UI that changes structure based on how users think. Built for humans and AI agents." />
    <meta name="twitter:image" content="https://raw.githubusercontent.com/rafatocantins/Fluxxis/main/demo/public/og-image.png" />

    <!-- Fonts: Inter (sans) + JetBrains Mono (code) — Fluxxis v2.0 spec -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

    <!-- Fluxxis v2.0 Design Tokens → CSS Custom Properties -->
    <style>
      :root {
        /* ---- Palette: Core ---- */
        --flux-bg-primary:       #08080f;
        --flux-bg-secondary:     #0e0e18;
        --flux-bg-tertiary:      #14141f;
        --flux-bg-elevated:      #1a1a2e;
        --flux-bg-glass:         rgba(20, 20, 35, 0.72);

        /* ---- Palette: Accent ---- */
        --flux-accent-primary:   #00d4aa;
        --flux-accent-secondary: #22d3ee;
        --flux-accent-glow:      rgba(0, 212, 170, 0.28);
        --flux-accent-soft:      rgba(0, 212, 170, 0.10);

        /* ---- Palette: Text (AA on #08080f) ---- */
        --flux-text-primary:     #f0f0f5;
        --flux-text-secondary:   #b0b0c0;
        --flux-text-tertiary:    #787890;
        --flux-text-inverse:     #08080f;

        /* ---- Palette: Borders ---- */
        --flux-border-default:   rgba(255, 255, 255, 0.08);
        --flux-border-strong:    rgba(255, 255, 255, 0.14);
        --flux-border-accent:    rgba(0, 212, 170, 0.35);

        /* ---- Typography ---- */
        --flux-font-sans:        'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        --flux-font-mono:        'JetBrains Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace;
        --flux-font-size-xs:     0.75rem;
        --flux-font-size-sm:     0.875rem;
        --flux-font-size-base:   1rem;
        --flux-font-size-lg:     1.125rem;
        --flux-font-size-xl:     1.25rem;
        --flux-font-size-2xl:    1.5rem;
        --flux-font-size-3xl:    2rem;
        --flux-font-size-4xl:    2.75rem;
        --flux-font-size-5xl:    3.5rem;
        --flux-font-weight-normal: 400;
        --flux-font-weight-medium: 500;
        --flux-font-weight-semibold: 600;
        --flux-font-weight-bold: 700;
        --flux-font-weight-extrabold: 800;
        --flux-line-height-tight: 1.15;
        --flux-line-height-snug: 1.35;
        --flux-line-height-normal: 1.6;

        /* ---- Spacing ---- */
        --flux-space-1: 0.25rem;
        --flux-space-2: 0.5rem;
        --flux-space-3: 0.75rem;
        --flux-space-4: 1rem;
        --flux-space-5: 1.25rem;
        --flux-space-6: 1.5rem;
        --flux-space-8: 2rem;
        --flux-space-10: 2.5rem;
        --flux-space-12: 3rem;
        --flux-space-16: 4rem;
        --flux-space-20: 5rem;
        --flux-space-24: 6rem;

        /* ---- Radii ---- */
        --flux-radius-sm: 6px;
        --flux-radius-md: 10px;
        --flux-radius-lg: 14px;
        --flux-radius-xl: 20px;
        --flux-radius-full: 9999px;

        /* ---- Shadows ---- */
        --flux-shadow-sm: 0 1px 2px rgba(0,0,0,0.4);
        --flux-shadow-md: 0 4px 16px rgba(0,0,0,0.5);
        --flux-shadow-lg: 0 8px 32px rgba(0,0,0,0.6);
        --flux-shadow-glow: 0 0 40px var(--flux-accent-glow);
        --flux-shadow-glow-sm: 0 0 16px var(--flux-accent-glow);

        /* ---- Transitions ---- */
        --flux-transition-fast: 120ms ease;
        --flux-transition-base: 200ms ease;
        --flux-transition-morph: 350ms cubic-bezier(0.4, 0, 0.2, 1);
        --flux-transition-smooth: 400ms cubic-bezier(0.4, 0, 0.2, 1);

        /* ---- Layout ---- */
        --flux-max-width: 1200px;
      }

      /* Reset & Base */
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      html {
        scroll-behavior: smooth;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      body {
        font-family: var(--flux-font-sans);
        font-size: var(--flux-font-size-base);
        font-weight: var(--flux-font-weight-normal);
        line-height: var(--flux-line-height-normal);
        color: var(--flux-text-primary);
        background: var(--flux-bg-primary);
        overflow-x: hidden;
        min-height: 100vh;
      }
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background:
          radial-gradient(ellipse 80% 60% at 50% 0%, rgba(0, 212, 170, 0.04) 0%, transparent 60%),
          radial-gradient(ellipse 60% 50% at 85% 40%, rgba(34, 211, 238, 0.03) 0%, transparent 60%),
          linear-gradient(180deg, var(--flux-bg-primary) 0%, #0c0c1a 100%);
      }

      /* WCAG 2.1 AA: Visible focus indicator */
      *:focus-visible {
        outline: 2px solid var(--flux-accent-primary);
        outline-offset: 3px;
        border-radius: var(--flux-radius-sm);
      }

      /* WCAG 2.1 AA: Respect reduced-motion preference (FLIP morph: 80ms → 0ms) */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }

      /* Responsive font sizing */
      @media (max-width: 768px) {
        :root {
          --flux-font-size-5xl: 2.2rem;
          --flux-font-size-4xl: 1.75rem;
          --flux-font-size-3xl: 1.5rem;
          --flux-font-size-2xl: 1.35rem;
        }
      }
      @media (max-width: 480px) {
        :root {
          --flux-font-size-5xl: 1.8rem;
          --flux-font-size-4xl: 1.5rem;
          --flux-font-size-3xl: 1.35rem;
          --flux-font-size-2xl: 1.2rem;
        }
      }

      img { max-width: 100%; display: block; }
      a {
        color: var(--flux-accent-primary);
        text-decoration: none;
        transition: color var(--flux-transition-fast);
      }
      a:hover { color: var(--flux-accent-secondary); }

      button {
        font-family: inherit;
        cursor: pointer;
        border: none;
        background: none;
        color: inherit;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <div style="padding: 40px 24px; text-align: center; font-family: Inter, sans-serif; color: #f0f0f5; background: #08080f; min-height: 100vh;">
        <h1 style="font-family: Inter, sans-serif; font-size: 2rem; font-weight: 800; background: linear-gradient(135deg, #00d4aa, #22d3ee); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Fluxxis</h1>
        <p style="color: #b0b0c0; max-width: 500px; margin: 16px auto; line-height: 1.6;">
          Interfaces that Morph with Intent. Adaptive UI that changes structure based on how users think — built for humans and AI agents.
        </p>
        <p style="color: #787890; margin-top: 24px;">
          JavaScript is required for the interactive demo. Please enable JavaScript to explore the full experience.
        </p>
      </div>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
