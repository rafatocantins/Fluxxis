name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish (core, react, ui, or all)'
        required: true
        default: 'all'
        type: choice
        options:
          - core
          - react
          - ui
          - all

jobs:
  publish-core:
    if: ${{ github.event.inputs.package == 'core' || github.event.inputs.package == 'all' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @fluxxis/core build
      - name: Check if version already published
        id: check-core
        run: |
          if npm view @fluxxis/core@0.2.0 version 2>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "⚠️ @fluxxis/core@0.2.0 already published, skipping"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
      - if: steps.check-core.outputs.exists != 'true'
        run: npm publish --access public
        working-directory: packages/core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-react:
    needs: publish-core
    if: ${{ github.event.inputs.package == 'react' || github.event.inputs.package == 'all' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @fluxxis/core build
      - run: pnpm --filter @fluxxis/react build
      - run: npm publish --access public
        working-directory: packages/react
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-ui:
    needs: publish-react
    if: ${{ github.event.inputs.package == 'ui' || github.event.inputs.package == 'all' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @fluxxis/core build
      - run: pnpm --filter @fluxxis/ui build
      - run: npm publish --access public
        working-directory: packages/ui
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
