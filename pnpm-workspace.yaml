# FLUXXIS Monorepo Configuration
# https://pnpm.io/workspaces

packages:
  # Core package (framework-agnostic)
  - 'packages/core'
  # React adapter package
  - 'packages/react'
  # Intent-driven wrapper (PoC)
  - 'packages/wrapper'
  # Design Tokens (CSS custom properties)
  - 'packages/ui'
  # Demo app (for testing)
  - 'demo'
